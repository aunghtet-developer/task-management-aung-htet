# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy PHP app to Azure Web App - apsservericetest

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: "composer.json"

      - name: Run composer install if composer.json exists
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer validate --no-check-publish && composer install --prefer-dist
          --no-progress
        # 1. Node.js ကို Setup လုပ်ခြင်း
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18" # သို့မဟုတ် သင့်စက်မှာ သုံးထားတဲ့ version

      # 2. NPM Packages များသွင်းပြီး Vue ကို Build လုပ်ခြင်း
      - name: Install NPM dependencies and Build Assets
        run: |
          npm install
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D73ABC3FF7584023A4CC68C1EA74C6F4
            }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_60D6AC1A1AAB47FD92FC13248359E789
            }}
          subscription-id: ${{
            secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4BE8909816E84E8284414E0EA6045512
            }}

      - name: "Deploy to Azure Web App"
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "apsservericetest"
          slot-name: "Production"
          package: .
